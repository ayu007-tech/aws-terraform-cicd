name: AWS CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:

  build-and-deploy:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          pip install -r app/requirements.txt

      - name: Run Tests
        run: |
          python -m py_compile app/app.py

      - name: Build Docker Image
        run: |
          docker build -t tourism-app .

      - name: Save Docker Image
        run: |
          docker save tourism-app > tourism-app.tar

      - name: Copy Image to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          source: tourism-app.tar
          target: /home/ubuntu/

      - name: Deploy on EC2
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            docker stop tourism-app || true
            docker rm tourism-app || true

            docker load < /home/ubuntu/tourism-app.tar

            docker run -d \
              --restart always \
              --name tourism-app \
              -p 80:5000 \
              tourism-app